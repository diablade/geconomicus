<button
	class="ms-2 blur box-shadowed"
	*ngIf="stroked"
	[ngClass]="white ? 'whiteBtn' : 'blackBtn'"
	mat-stroked-button
	(click)="showRules()">
	<mat-icon *ngIf="icon" class="outlined">info</mat-icon>
	{{ labelBtn | translate }}
</button>
<button
	class="ms-2 blur box-shadowed contourText"
	*ngIf="!stroked"
	[ngClass]="white ? 'whiteBtn' : 'blackBtn'"
	mat-raised-button
	(click)="showRules()">
	<mat-icon *ngIf="icon" class="outlined">info</mat-icon>
	{{ labelBtn | translate }}
</button>
