<button class="ms-2" *ngIf="stroked" mat-stroked-button (click)="showRules()">
	<mat-icon *ngIf="icon" class="outlined">info</mat-icon>
	{{ labelBtn | translate }}
</button>
<button class="ms-2 box-shadowed" *ngIf="!stroked" mat-raised-button (click)="showRules()">
	<mat-icon *ngIf="icon" class="outlined">info</mat-icon>
	{{ labelBtn | translate }}
</button>
