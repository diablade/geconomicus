<div class="d-flex flex-column h-100">
	<div class="d-flex flex-row justify-content-between">
		<img class="geco" src="./assets/images/geconomicus.png" alt="" />
		<div class="d-flex flex-row align-items-center">
			<app-tasklist-btn [stroked]="true"></app-tasklist-btn>
			<app-notice-btn
				[amountCardsForProd]="rules.amountCardsForProd"
				[timerCredit]="rules.timerCredit"
				[stroked]="true"></app-notice-btn>
			<app-language-btn [short]="true"></app-language-btn>
		</div>
	</div>
	<div class="fs-1 text-center pt-4 pb-4 shadowed" *ngIf="gameState && gameState.status === 'open'">
		{{ session.name }}
	</div>
	<div class="container h-100" *ngIf="gameState">
		<div class="d-flex align-items-center justify-content-evenly flex-row">
			<div class="d-flex flex-column">
				<video class="videoCard" #videoPlayerLT (click)="videoPlayerLT.play()" playsinline autoplay muted>
					<source src="assets/videos/panier.mp4" type="video/mp4" />
				</video>
				<video class="videoCard" #videoPlayerL (click)="videoPlayerL.play()" playsinline autoplay muted>
					<source src="assets/videos/bike.mp4" type="video/mp4" />
				</video>
			</div>
			<div class="countDownContainer">
				<coin
					class="coin"
					[coinImage]="'./assets/images/' + rules.typeMoney + '.png'"
					[height]="'100%'"
					[width]="'100%'"
					(click)="rules.rotate = !rules.rotate"
					[forceRotate]="rules.rotate"></coin>
				<div class="time">
					<div class="minute shadowed">{{ minutes }}</div>
					<div class="deuxpoints shadowed">:</div>
					<div class="seconds shadowed">{{ seconds }}</div>
				</div>
				<mat-progress-spinner
					[color]="'primary'"
					[mode]="'determinate'"
					[diameter]="300"
					strokeWidth="10"
					[value]="timerProgress"></mat-progress-spinner>
			</div>
			<div class="d-flex flex-column">
				<video class="videoCard" #videoPlayerRT playsinline (click)="videoPlayerRT.play()" autoplay muted>
					<source src="assets/videos/owl.mp4" type="video/mp4" />
				</video>
				<video class="videoCard" #videoPlayerR playsinline (click)="videoPlayerR.play()" autoplay muted>
					<source src="assets/videos/sun.mp4" type="video/mp4" />
				</video>
			</div>
		</div>
		<div class="d-flex mt-5 justify-content-center">
			<button class="ms-2" mat-raised-button color="accent" [routerLink]="['/session', session._id]">
				{{ 'MASTER.GO_BACK_TO_LOBBY' | translate }}
			</button>
			<button class="ms-2" mat-stroked-button color="primary" (click)="showEvents()">LIVE EVENTS 🔴📈</button>
			<button *ngIf="session.devMode" class="ms-2" mat-stroked-button (click)="resetGameFromBtn()">
				{{ 'MASTER.RESET' | translate }}
				<fa-icon [icon]="faWarning"></fa-icon>
			</button>
			<button
				*ngIf="gameState.status === STARTED || gameState.status === PAUSED"
				class="ms-2"
				mat-raised-button
				color="warn"
				(click)="startRound()">
				<fa-icon [icon]="faPlay"></fa-icon>
				{{ 'MASTER.START' | translate }}
			</button>
			<button
				*ngIf="gameState.status === PLAYING"
				mat-raised-button
				color="warn"
				class="ms-2"
				(click)="pauseRound()">
				<fa-icon [icon]="faPause"></fa-icon>
				{{ 'MASTER.PAUSE_ROUND' | translate }}
			</button>
			<button
				*ngIf="gameState.status === PLAYING || gameState.status === PAUSED"
				mat-raised-button
				color="warn"
				class="ms-2"
				(click)="endRound()">
				<fa-icon [icon]="faStop"></fa-icon>
				{{ 'MASTER.END_ROUND' | translate }}
			</button>
			<button
				*ngIf="gameState.status === STOPPED"
				class="ms-2"
				mat-raised-button
				color="accent"
				(click)="sendSurvey()">
				{{ 'MASTER.SEND_SURVEY' | translate }}
			</button>
		</div>
		<div class="d-flex flex-row mt-4 align-items-center justify-content-center">
			<div *ngIf="session.devMode">
				<button class="m-2" mat-stroked-button (click)="goToAdmin()">
					God mode
					<fa-icon [icon]="faEye"></fa-icon>
				</button>
			</div>
			<button
				*ngIf="gameState.typeMoney === DEBT"
				class="m-2"
				mat-raised-button
				color="accent"
				(click)="showBank()">
				{{ 'MASTER.BANK_BTN' | translate }}
				<fa-icon [icon]="faBuildingColumns"></fa-icon>
			</button>
			<fa-icon
				*ngIf="gameState.typeMoney === DEBT"
				class="joinQr"
				(click)="qrCodeBank()"
				[icon]="faQrcode"></fa-icon>
		</div>
	</div>
	<!-- <div class="text-center" *ngIf="game && game.status === OPEN"> -->
	<!-- <h2 class="fs-3 shadowed ">{{ 'MASTER.USERS_CONNECTED' | translate }}</h2> -->
	<!-- <mat-slide-toggle class="" [color]="'warn'" [(ngModel)]="deleteUser"> -->
	<!-- {{ 'MASTER.DELETE_USER' | translate }} -->
	<!-- </mat-slide-toggle> -->
	<!-- </div> -->
	<div class="text-center" *ngIf="gameState && gameState.status !== CREATED">
		<h2 class="fs-3 shadowed">{{ 'MASTER.PLAYERS' | translate }}</h2>
		<mat-slide-toggle *ngIf="!rules.autoDeath || session.devMode" class="" [color]="'warn'" [(ngModel)]="killUser">
			{{ 'MASTER.KILL_USERS' | translate }} ☠️
		</mat-slide-toggle>
	</div>
	<div class="p-3 sunyBg backgroundPlayers-Small">
		<div class="d-flex flex-row justify-content-center flex-wrap">
			<div *ngFor="let player of gameState.playersLifes" class="player d-flex flex-column">
				<div class="d-flex flex-row justify-content-center player-action">
					<a href="{{ getUserUrl(player.idx.toString()) }}" target="_blank">{{ player.name }}</a>
					<fa-icon
						class="joinQr"
						(click)="reJoin(player.idx.toString(), player.name)"
						[icon]="faQrcode"></fa-icon>
					<!-- <fa-icon
						*ngIf="deleteUser"
						class="delete"
						(click)="onDeleteUser(player)"
						[icon]="faTrashCan"></fa-icon> -->
				</div>
				<div class="dead" *ngIf="player.status === 'dead'">🪦</div>
				<div class="deadprompt" *ngIf="killUser && player.status === 'alive'" (click)="onKillUser(player)">
					☠️
				</div>
				<!-- <avatar></avatar> -->

				<!-- <div -->
				<!-- class="player-frame" -->
				<!-- [ngClass]="gameState && gameState.status === 'open' ? 'player-svg' : 'player-svgSmall'" -->
				<!-- [ngStyle]="{ 'border-color': '#' + player.hairColor }" -->
				<!-- [innerHTML]="getSanitizedSvgFromString(player.image)"></div> -->
			</div>
		</div>
	</div>
</div>
