<ng-container *ngIf="vm$ | async as vm">
	<div class="h-100" [ngClass]="[vm.rules.typeMoney === JUNE ? 'juneBg' : 'debtBg']">
		<div class="h-100 dots overflow-auto">
			<div class="d-flex flex-row justify-content-between">
				<img class="geco glow" src="./assets/images/geconomicus.png" alt="" />
				<div class="d-flex flex-row align-items-center">
					<online-status [connection]="(masterConnection$ | async) || null"></online-status>
					<app-tasklist-btn [white]="vm.rules.typeMoney !== JUNE" [stroked]="true"></app-tasklist-btn>
					<app-notice-btn
						[amountCardsForProd]="vm.rules.amountCardsForProd || 0"
						[timerCredit]="vm.rules.timerCredit || 0"
						[stroked]="true"
						[white]="vm.rules.typeMoney !== JUNE"></app-notice-btn>
					<app-language-btn [short]="true"></app-language-btn>
				</div>
			</div>
			<div class="d-flex flex-column">
				<div class="container z1">
					<div class="d-flex align-items-center justify-content-evenly flex-row flex-wrap">
						<div class="d-flex flex-column">
							<video
								class="videoCard box-shadowed"
								#videoPlayerLT
								(click)="videoPlayerLT.play()"
								playsinline
								autoplay
								muted>
								<source src="assets/videos/panier.mp4" type="video/mp4" />
							</video>
							<video
								class="videoCard box-shadowed"
								#videoPlayerL
								(click)="videoPlayerL.play()"
								playsinline
								autoplay
								muted>
								<source src="assets/videos/bike.mp4" type="video/mp4" />
							</video>
						</div>
						<div class="countDownContainer">
							<coin
								class="coin"
								[coinImage]="'./assets/images/' + vm.rules.typeMoney + '.png'"
								[height]="'100%'"
								[width]="'100%'"
								(click)="toggleCoinRotate()"
								[forceRotate]="coinRotate"></coin>
							<div class="time">
								<div class="minute shadowed">{{ vm.minutes }}</div>
								<div class="deuxpoints shadowed">:</div>
								<div class="seconds shadowed">{{ vm.seconds }}</div>
							</div>
							<mat-progress-spinner
								[color]="'primary'"
								[mode]="'determinate'"
								[diameter]="spinnerDiameter()"
								strokeWidth="10"
								[value]="vm.timerProgress"></mat-progress-spinner>
						</div>
						<div class="d-flex flex-column">
							<video
								class="videoCard box-shadowed"
								#videoPlayerRT
								playsinline
								(click)="videoPlayerRT.play()"
								autoplay
								muted>
								<source src="assets/videos/owl.mp4" type="video/mp4" />
							</video>
							<video
								class="videoCard box-shadowed"
								#videoPlayerR
								playsinline
								(click)="videoPlayerR.play()"
								autoplay
								muted>
								<source src="assets/videos/sun.mp4" type="video/mp4" />
							</video>
						</div>
					</div>
					<div class="fs-3 text-center pb-1 shadowed">
						{{ vm.session.name }} -
						{{ vm.gameState.typeMoney === DEBT ? ('DEBT_MONEY' | translate) : ('FREE_MONEY' | translate) }}
					</div>
					<ng-container *ngIf="vm.gameState.status === STOPPED">
						<div class="mt-4 fs-2 fw-bold text-center pb-1 shadowed">
							{{ 'MASTER.GAME_ENDED' | translate }}
						</div>
					</ng-container>
					<div class="d-flex mt-5 justify-content-center">
						<button
							class="ms-2 box-shadowed blur"
							[ngClass]="vm.rules.typeMoney !== JUNE ? 'whiteBtn' : 'blackBtn'"
							mat-stroked-button
							color="primary"
							(click)="goBackToLobby()">
							<mat-icon>arrow_back</mat-icon>
							{{ 'BACK_TO_LOBBY' | translate }}
						</button>
						<button
							*ngIf="vm.gameState.status === CREATED"
							mat-raised-button
							color="accent"
							class="ms-2 box-shadowed"
							(click)="initGame()">
							<mat-icon class="outlined">playing_cards</mat-icon>
							{{ 'MASTER.DISTRIBUTE_CARDS' | translate }}
						</button>
						<button
							*ngIf="vm.gameState.status === INITIALIZED || vm.gameState.status === PAUSED"
							class="ms-2 box-shadowed"
							mat-raised-button
							color="warn"
							(click)="launchGame(vm.gameState.status)">
							<mat-icon>play_arrow</mat-icon>
							{{
								vm.gameState.status === INITIALIZED
									? ('MASTER.START_GAME' | translate)
									: ('MASTER.RESUME_GAME' | translate)
							}}
						</button>
						<button
							*ngIf="vm.gameState.status === PLAYING"
							mat-raised-button
							color="warn"
							class="ms-2 box-shadowed"
							(click)="pauseGame()">
							<mat-icon>pause</mat-icon>
							{{ 'MASTER.PAUSE_GAME' | translate }}
						</button>
						<button
							*ngIf="vm.gameState.status === PLAYING || vm.gameState.status === PAUSED"
							mat-raised-button
							color="warn"
							class="ms-2 box-shadowed"
							(click)="stopGame()">
							<mat-icon>stop</mat-icon>
							{{ 'MASTER.END_GAME' | translate }}
						</button>
					</div>
					<div class="d-flex flex-row mt-4 align-items-center justify-content-center">
						<div *ngIf="vm.session.devMode">
							<button
								class="m-2 box-shadowed blur"
								[ngClass]="vm.rules.typeMoney !== JUNE ? 'whiteBtn' : 'blackBtn'"
								mat-stroked-button
								(click)="goToAdmin()">
								<mat-icon class="outlined">table_eye</mat-icon>
								{{ 'MASTER.GAME_TABLE_VIEW' | translate }}
							</button>
						</div>
						<button
							*ngIf="vm.gameState.typeMoney === DEBT"
							class="m-2 box-shadowed"
							mat-raised-button
							color="accent"
							[disabled]="
								vm.gameState.status === CREATED ||
								(vm.gameState.status === STOPPED && !vm.session.devMode)
							"
							[routerLink]="['/bank', sessionId, gameStateId]">
							<mat-icon>account_balance</mat-icon>
							{{ 'MASTER.BANK_BTN' | translate }}
						</button>
						<button
							*ngIf="vm.gameState.typeMoney === DEBT && vm.gameState.status !== STOPPED"
							mat-icon-button
							(click)="qrCodeBank()">
							<mat-icon>qr_code</mat-icon>
						</button>
					</div>
				</div>
				<div class="backgroundPlayers mt-4">
					<div class="d-flex justify-content-center">
						<div class="players frame frame-light">
							<div class="d-flex flex-row justify-content-center flex-wrap">
								<div *ngFor="let player of playersAC$ | async" class="player d-flex flex-column">
									<div class="avatar-container">
										<avatar
											[avatar]="player.avatar"
											[width]="'80px'"
											[height]="'80px'"
											[playerStatus]="player.status"
											[onlineStatus]="true"
											[connection]="player.connection || null"
											[namePosition]="'bottom'"
											[matMenuTriggerFor]="aboveMenu"></avatar>
									</div>
									<mat-menu #aboveMenu="matMenu" yPosition="above">
										<button
											mat-menu-item
											[routerLink]="[
												'/player',
												sessionId,
												player.avatar?.idx,
												gameStateId,
												player.idx,
											]">
											<mat-icon>play_arrow</mat-icon>
											<span>{{ 'MASTER.PLAY_USER' | translate }}</span>
										</button>
										<button mat-menu-item (click)="copyPlayerLink(player)">
											<mat-icon>link</mat-icon>
											<span>{{ 'MASTER.COPY_USER_LINK' | translate }}</span>
										</button>
										<button mat-menu-item (click)="reJoin(player)">
											<mat-icon>qr_code_2</mat-icon>
											<span>{{ 'MASTER.JOIN_VIA_QR_CODE' | translate }}</span>
										</button>
										<button mat-color="warn" mat-menu-item (click)="killUserNow(player)">
											<mat-icon [color]="'warn'">person_remove</mat-icon>
											<span>{{ 'MASTER.KILL_USER' | translate }}</span>
										</button>
									</mat-menu>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</ng-container>
