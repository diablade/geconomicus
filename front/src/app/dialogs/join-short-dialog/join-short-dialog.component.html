<div class="confirmDialog m-2">
	<h1 mat-dialog-title>{{ 'DIALOG_JOIN_SHORT_CODE.SHORT_ID_TITLE' | translate }}</h1>
	<div mat-dialog-content>
		<div class="d-flex flex-column align-items-center">
			<div class="mb-2">{{ 'DIALOG_JOIN_SHORT_CODE.SHORT_ID_DESC' | translate }}</div>
			<mat-form-field class="inputShort">
				<mat-label>Ex: 0042</mat-label>
				<input matInput type="text" required [(ngModel)]="shortId" (keyup.enter)="join()" />
				<button *ngIf="shortId" matSuffix mat-icon-button aria-label="Clear" (click)="shortId = ''">
					<fa-icon [icon]="faXmark"></fa-icon>
				</button>
			</mat-form-field>
		</div>
		<div class="simple-keyboard"></div>
	</div>
	<div class="d-flex justify-content-between">
		<button mat-button [mat-dialog-close]="">{{ 'CANCEL' | translate }}</button>
		<button mat-raised-button color="primary" [disabled]="shortId.length < 4" [mat-dialog-close]="shortId">
			{{ 'DIALOG_JOIN_SHORT_CODE.SEARCH' | translate }}
		</button>
	</div>
</div>
