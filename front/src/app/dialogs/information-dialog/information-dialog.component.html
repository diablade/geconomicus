<h1 (click)="back()" mat-dialog-title>{{ title }}</h1>
<div (click)="back()" mat-dialog-content>
	<p [innerHTML]="message"></p>
	<p *ngIf="message2" [innerHTML]="message2"></p>
</div>
<div mat-dialog-actions class="d-flex justify-content-end">
	<button-timer [secondsTimer]="timerBtn" [label]="labelBtn" (timerEnd)="back()"></button-timer>
</div>
